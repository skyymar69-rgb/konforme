<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Konforme — Accessibilité web RGAA & WCAG automatisée par IA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#131a2c"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#cbd5ff"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand mark -->
  <g transform="translate(80,76)">
    <rect width="62" height="62" rx="16" fill="url(#brand)"/>
    <g fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 42 L24 32 L34 38 L48 22"/>
      <circle cx="14" cy="42" r="3" fill="#fff"/>
      <circle cx="24" cy="32" r="3" fill="#fff"/>
      <circle cx="34" cy="38" r="3" fill="#fff"/>
      <circle cx="48" cy="22" r="3" fill="#fff"/>
    </g>
    <text x="82" y="42" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="38" font-weight="800" fill="#f1f5fb" letter-spacing="-0.5">Konforme</text>
  </g>

  <!-- Title -->
  <text x="80" y="290" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" fill="url(#title)" letter-spacing="-2">Accessibilité web</text>
  <text x="80" y="376" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" fill="url(#title)" letter-spacing="-2">automatisée par IA</text>

  <!-- Subtitle -->
  <text x="80" y="438" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="28" font-weight="500" fill="#a3b0c9">Conformité RGAA 4.1 · WCAG 2.2 · EAA 2025</text>

  <!-- Pills -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#f1f5fb">
    <g transform="translate(80,500)">
      <rect width="190" height="50" rx="25" fill="rgba(37,99,235,0.18)" stroke="#2563eb" stroke-width="1.5"/>
      <text x="95" y="32" text-anchor="middle">106 critères RGAA</text>
    </g>
    <g transform="translate(286,500)">
      <rect width="200" height="50" rx="25" fill="rgba(6,182,212,0.18)" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="100" y="32" text-anchor="middle">Corrections IA</text>
    </g>
    <g transform="translate(502,500)">
      <rect width="200" height="50" rx="25" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="100" y="32" text-anchor="middle">Monitoring 24/7</text>
    </g>
  </g>

  <!-- Domain (bottom right) -->
  <text x="1120" y="586" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#67e8f9">konforme.kayzen-lyon.fr</text>
</svg>
