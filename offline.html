<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hors ligne — Konforme</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="theme-color" content="#2563eb" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(60% 40% at 50% 0%, rgba(37,99,235,0.18), transparent 60%), #0a0e1a;
    color: #f1f5fb; display: grid; place-items: center; padding: 24px;
  }
  .card {
    max-width: 480px; text-align: center;
    background: linear-gradient(180deg, #131a2c 0%, #1a2238 100%);
    border: 1px solid #2a3654; border-radius: 16px; padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .icon {
    width: 64px; height: 64px; margin: 0 auto 18px;
    background: linear-gradient(135deg,#2563eb,#06b6d4);
    border-radius: 16px; display: grid; place-items: center;
  }
  h1 { font-size: 1.5rem; margin: 0 0 8px; letter-spacing: -0.02em; }
  p { color: #a3b0c9; margin: 0 0 20px; line-height: 1.55; }
  button { padding: 12px 18px; border: 0; border-radius: 10px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
  button:hover { background: #3b82f6; }
  button:focus-visible { outline: 3px solid #fbbf24; outline-offset: 3px; }
</style>
</head>
<body>
<main class="card" role="alert" aria-live="polite">
  <div class="icon" aria-hidden="true">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8.5A18 18 0 0 1 22 8.5"/><path d="M5 12.5A12 12 0 0 1 19 12.5"/><path d="M8 16.5A6 6 0 0 1 16 16.5"/><circle cx="12" cy="20" r="1"/><line x1="3" y1="3" x2="21" y2="21"/></svg>
  </div>
  <h1>Hors ligne</h1>
  <p>Cette page n'est pas disponible sans connexion. Vérifiez votre réseau puis réessayez.</p>
  <button type="button" onclick="location.reload()">Réessayer</button>
</main>
</body>
</html>
