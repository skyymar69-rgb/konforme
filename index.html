        Konforme utilise uniquement des cookies strictement nécessaires et, avec votre accord, une mesure d'audience anonymisée.
        <a href="/legal/cookies.html" style="color:#3b82f6;text-decoration:underline">En savoir plus</a>.
      </p>

        <button id="kf-cb-accept" type="button"
                style="flex:1;min-width:120px;padding:10px 14px;border-radius:10px;border:0;background:#2563eb;color:#fff;font-weight:600;cursor:pointer">Tout accepter</button>
        <button id="kf-cb-refuse" type="button"
                style="flex:1;min-width:120px;padding:10px 14px;border-radius:10px;border:1px solid #2a3654;background:transparent;color:#f1f5fb;font-weight:600;cursor:pointer">Tout refuser</button>

           style="flex:1;min-width:120px;padding:10px 14px;border-radius:10px;border:1px solid #2a3654;background:transparent;color:#f1f5fb;font-weight:600;text-align:center;text-decoration:none">Personnaliser</a>
      </div>
    </div>
    <script>
      (function(){
        var KEY='konforme.cookie-consent.v1';
        var el=document.getElementById('kf-cookie-banner');
        function set(v){try{localStorage.setItem(KEY,JSON.stringify({analytics:!!v.analytics,marketing:!!v.marketing,ts:Date.now()}))}catch(_){}el.hidden=true}
        try{if(localStorage.getItem(KEY))return}catch(_){return}
        el.hidden=false;
        document.getElementById('kf-cb-accept').addEventListener('click',function(){set({analytics:true,marketing:true})});
        document.getElementById('kf-cb-refuse').addEventListener('click',function(){set({analytics:false,marketing:false})});
      })();
